name: Build and Release APK

on: 
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code 
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -keyalg RSA -keysize 2048 -validity 10000 \
          -alias androiddebugkey -keypass android -storepass android -dname "CN=Android,O=Android,C=US"

    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon -Pkotlin.incremental.ksp=false -Pksp.useKSP2=true

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app-release.apk

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        files: app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
